[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Exit immediately on first failure during development; remove -x for CI
addopts = -v --tb=short

# Coverage (requires pytest-cov)
# Uncomment to enforce thresholds:
# addopts = -v --tb=short --cov=credit_lens_logic --cov-report=term-missing --cov-fail-under=80

[tool:pytest]
markers =
    unit: Pure logic tests (no I/O)
    integration: Tests using fixture files
    e2e: Full workflow tests (requires live MCP)
