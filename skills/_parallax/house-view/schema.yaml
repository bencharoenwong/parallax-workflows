# Parallax House View — Canonical Schema
#
# This file is the single source of truth for the house-view YAML structure.
# JIT-loaded by skills/load-house-view/SKILL.md (writer) and skills/_parallax/house-view/loader.md (consumers).
#
# Phase 0: stored on disk at ~/.parallax/active-house-view/view.yaml + prose.md.
# Phase 1: same shape, persisted in Supabase keyed by org_id.
#
# All metadata fields are REQUIRED at ingest. Tilts are sparse — only declare what the CIO actually has a view on.
# Omitted tilt fields default to neutral (0).

metadata:
  view_id: <uuid v4>                         # generated at ingest, immutable for life of view family
  view_name: "Q2 2026 House View"            # human-readable, shown in banners
  uploaded_by: "cio@firm.example"            # email or stable user id
  uploader_role: CIO                         # one of: CIO | PM | Investment Committee | Strategist | Other
  upload_timestamp: "2026-04-01T09:30:00Z"   # ISO 8601, when ingest completed
  effective_date: "2026-04-01"               # ISO 8601 date; tilts do not apply before this
  valid_through: "2026-06-30"                # ISO 8601 date or null; if null, auto_expire_days governs
  auto_expire_days: 90                       # int; only used when valid_through is null
  basis_statement: |                         # free text — required for institutional ingest
    Q2 view derived from internal IC meeting 2026-03-28. Reflects committee
    consensus on growth deceleration in DM ex-US, sticky core inflation, and
    re-acceleration in EM ex-China.
  source_documents:                          # list of files / URLs view was extracted from
    - "Q2-2026-house-view.pdf"
  version_id: <uuid v4>                      # generated per save; changes on every update
  parent_version_id: null                    # uuid of immediate predecessor; null for first version
  view_hash: <sha256 of canonical tilts body>  # see "view_hash computation" below

# ---------------------------------------------------------------------------
# TILTS — sparse, integer scale -2 to +2.
# Multiplier mapping is in loader.md §"Multiplier mapping". Don't duplicate here.
#
# Scope: EQUITY PORTFOLIOS ONLY. Cross-asset allocation (fixed income, FX, credit,
# commodities, alternatives) is deliberately out of scope. Full TAA workbooks carry
# views across all asset classes — on ingest of such a workbook, non-equity views are
# NOT captured by this schema and must be applied via a separate allocation layer.
#
# Pillar vocabulary follows a four-pillar quantum-factor decomposition:
#   Ω Econometrics Phase       — macro backdrop (politics/econ/monetary/fiscal/inflation/curve)
#   Φ Valuation State          — absolute and relative valuation
#   Ξ Market Entropy           — vol, flows, technicals, information flow, issuance
#   Ψ Psychological Wavelength — sentiment, greed/fear, risk-on/risk-off
#   Parallax factors           — value, profitability, momentum, low-vol, trading signals
#
# This decomposition is not firm-specific; any multi-signal framework that separates
# macro / valuation / technicals / sentiment has similar structure. Adopt the labels
# that match your house's vocabulary — the loader reads the YAML keys, not the prose.
# ---------------------------------------------------------------------------

tilts:

  # Quantum-factor pillar scores (coarse CIO-level take per pillar, -2 to +2).
  # Pillar scores are ENCODING-ONLY in Phase 0 — stored for forward-compatibility
  # but NOT auto-translated into factor multipliers or consumer-skill output.
  # See loader.md §3 "Quantum-factor pillars" for the Phase 0 contract.
  pillars:
    econometrics_phase: 0           # Ω. +2 = constructive backdrop, -2 = recessionary/stress
    valuation_state: 0              # Φ. +2 = very undervalued, -2 = highly overvalued
    market_entropy: 0               # Ξ. +2 = low/ordered, -2 = high/disordered
    psychological_wavelength: 0     # Ψ. +2 = very positive, -2 = very negative

  # 11 GICS sectors. Use the exact strings below — loader matches by string.
  sectors:
    energy: 0
    materials: 0
    industrials: 0
    consumer_discretionary: 0
    consumer_staples: 0
    health_care: 0
    financials: 0
    information_technology: 0
    communication_services: 0
    utilities: 0
    real_estate: 0

  # Regions. Loader maps RIC suffix → region per parallax-conventions.md §1.
  # Free-form keys allowed beyond the canonical set; loader warns on unknown keys.
  # Expanded 2026-04-22 to canonical 27-country equity coverage.
  # BROAD buckets (europe, em_ex_china, apac_ex_japan, emea) are unions — prefer specific
  # country keys when the view has granular conviction; loader.md §3 describes precedence.
  regions:
    # --- Developed Markets ---
    us: 0
    canada: 0                              # added 2026-04-22
    uk: 0
    europe: 0                              # broad
    germany: 0                             # added 2026-04-22
    france: 0                              # added 2026-04-22
    italy: 0                               # added 2026-04-22
    spain: 0                               # added 2026-04-22
    switzerland: 0                         # added 2026-04-22
    japan: 0
    australia: 0                           # added 2026-04-22

    # --- Emerging / Frontier Asia ---
    china: 0
    hong_kong: 0                           # added 2026-04-22 (distinguishes from mainland A-shares)
    taiwan: 0
    south_korea: 0
    india: 0
    apac_ex_japan: 0                       # broad

    # --- ASEAN ---
    singapore: 0                           # added 2026-04-22
    indonesia: 0                           # added 2026-04-22
    philippines: 0                         # added 2026-04-22
    thailand: 0                            # added 2026-04-22
    vietnam: 0                             # added 2026-04-22
    malaysia: 0                            # added 2026-04-22

    # --- Latam ---
    em_ex_china: 0                         # broad
    mexico: 0                              # added 2026-04-22
    brazil: 0                              # added 2026-04-22
    chile: 0                               # added 2026-04-22

    # --- EMEA / MENA ---
    emea: 0                                # added 2026-04-22
    mena: 0                                # added 2026-04-22

  # Parallax factor scores. Loader applies as composite-weight multipliers.
  # Canonical set: value, profitability, momentum, low-volatility, trading-signals —
  # all five are established academic/industry factors (Fama-French, Asness QMJ,
  # Frazzini-Pedersen BAB, Jegadeesh-Titman momentum, short-horizon technical signals).
  # `quality` and `defensive` are retained as backward-compat synonyms — loader.md §3
  # "Factor aliases" defines the collapse rule (canonical wins on conflict, loader warns).
  factors:
    # --- Canonical factor set ---
    value: 0
    profitability: 0                       # added 2026-04-22 — canonical (was `quality`)
    momentum: 0
    low_volatility: 0                      # added 2026-04-22 — canonical (was `defensive`)
    trading_signals: 0                     # added 2026-04-22 — short-term technical signals

    # --- Backward-compatible synonyms ---
    quality: 0                             # synonym of profitability; use profitability preferentially
    defensive: 0                           # synonym of low_volatility; use low_volatility preferentially

  # Style tilts. Each dimension has different semantics — see loader.md §"Style semantics".
  styles:
    cap_size:                                 # universe-filter semantics
      large: 0
      mid: 0
      small: 0
    # growth_value collapses into the factors.value tilt at consume time —
    # set EITHER factors.value OR styles.growth_value, not both. Loader warns on conflict.
    growth_value:
      growth: 0
      value: 0

  # Named themes. Free-form string keys; loader treats as universe + weight tilt per multiplier table.
  # Aim for themes Parallax can resolve via build_stock_universe queries.
  themes:
    ai_infrastructure: 0
    energy_transition: 0
    defense: 0
    obesity_drugs: 0
    reshoring: 0                           # added 2026-04-21 — recurring across reflationary/AI/China-skeptic views

  # Hard excludes. Always honored, including over explicit user requests
  # (loader surfaces a block message with the exclusion reason).
  # Each entry is a string matching a sector key, region key, RIC, or theme key.
  excludes:
    - tobacco                                # theme/category
    - weapons
    - "GAZP.MM"                              # specific RIC
    - russia                                 # region
  exclude_reasons:                           # parallel array — same length as excludes
    - "ESG mandate"
    - "ESG mandate"
    - "Sanctions compliance"
    - "Sanctions compliance"

  # OPTIONAL: CIO conviction per non-zero tilt (0.0-1.0).
  # Conviction is DISTINCT from extraction_confidence — the latter measures whether
  # the extractor captured the view correctly; this measures how strongly the uploader
  # believes the view. Loader surfaces low conviction in the preamble but does NOT
  # attenuate the tilt multiplier — conviction is informational, not a math input.
  # Sparse: only populate for non-zero tilts where the uploader wanted to flag conviction.
  tilt_conviction:
    pillars: {}                              # e.g., {valuation_state: 0.4}
    sectors: {}                              # e.g., {financials: 0.7}
    regions: {}
    factors: {}
    styles: {}
    themes: {}

  # Macro regime view. OPTIONAL — some views (mandate-driven ESG, geopolitical theses)
  # don't speak in macro-regime terms. When omitted or any sub-field set to null, loader.md §3
  # "Macro regime mapping" skips the auto-tilt row for that dimension. Do NOT default to
  # neutral+neutral when the source is silent — that misrepresents the uploader's thesis.
  # At ingest, loader maps these to factor tilts and surfaces the mapping to the uploader
  # for confirmation. See loader.md §"Macro regime mapping".
  macro_regime:
    growth: null                             # one of: expansion | reflationary | neutral | slowing | recessionary | null
    inflation: null                          # one of: disinflation | benign | sticky | accelerating | null
    rates: null                              # one of: cutting | holding | hiking | null
    risk_appetite: null                      # one of: risk_on | neutral | risk_off | null

# ---------------------------------------------------------------------------
# PROSE — verbatim CIO narrative, paired by hash.
# Stored in a sibling prose.md file in Phase 0; same dir as view.yaml.
# Schema below documents the pairing field that lives in prose.md frontmatter.
# ---------------------------------------------------------------------------

# prose.md structure (separate file):
# ---
# paired_yaml_hash: <sha256 — must match view_hash above>
# prose_body_hash: <sha256 of the prose body (everything after the closing `---` of
#                   this frontmatter), utf-8 encoded, computed per §prose_body_hash below>
# view_id: <uuid — must match metadata.view_id>
# version_id: <uuid — must match metadata.version_id>
# ---
# <verbatim CIO narrative as markdown>
#
# ===========================================================================
# prose_body_hash computation
# ===========================================================================
# Purpose: detect tampering of the prose body after save. `paired_yaml_hash` only
# protects the YAML body → prose frontmatter edge; a reader editing the prose
# body without re-pairing would otherwise go undetected by loader.md §2. The
# `prose_body_hash` closes that gap.
#
# Algorithm:
#   1. Read the full prose.md file as bytes.
#   2. Strip the leading frontmatter block: everything from the first `---\n`
#      up to and including the second `---\n`. If no frontmatter, the body is
#      the entire file.
#   3. prose_body_hash = sha256(body_bytes).hexdigest()
#
# Reference Python snippet (self-contained, no yaml dependency):
#
#   import hashlib
#   def compute_prose_body_hash(prose_text: str) -> str:
#       data = prose_text.encode("utf-8")
#       marker = b"---\n"
#       if data.startswith(marker):
#           end = data.find(marker, len(marker))
#           if end != -1:
#               data = data[end + len(marker):]
#       return hashlib.sha256(data).hexdigest()
#
# Loader (§2 step 3a, added 2026-04-24):
#   - Recompute prose_body_hash from the current prose.md file.
#   - Compare to frontmatter `prose_body_hash`.
#   - Mismatch → drift. Same failure message as paired_yaml_hash drift.
#
# Backward compatibility: views written before 2026-04-24 have no
# `prose_body_hash` in frontmatter. Loader treats a MISSING field as "legacy
# view, skip body-hash verification" rather than a drift failure. New saves
# MUST include it. Re-running `/parallax-load-house-view --re-pair` on a legacy
# view computes and injects the field.

# ---------------------------------------------------------------------------
# EXTRACTION — provenance + confidence.
# Records how the YAML was produced from source. Loader uses extraction_confidence
# to decide whether to surface field-level warnings.
# ---------------------------------------------------------------------------

extraction:
  source_type: pdf                           # pdf | text | url | manual
  extraction_method: "claude-opus-4-7"       # model id used; "manual" if uploader hand-edited
  extracted_at: "2026-04-01T09:28:00Z"
  extraction_confidence:                     # per-field 0.0-1.0; loader warns on any < 0.6
    pillars: 0.75                            # added 2026-04-22 — quantum-factor pillar scores
    sectors: 0.92
    regions: 0.85
    factors: 0.78
    styles: 0.72
    themes: 0.68
    excludes: 0.95
    macro_regime: 0.81
  extraction_notes: |                        # free text — what the extractor was uncertain about
    "Cautious on tech but selective in semis" interpreted as info_tech: -1 with
    ai_infrastructure: +1 to capture the semi exception. Confirm with uploader.
  uploader_confirmed: true                   # required true at save; loader refuses if false

# ===========================================================================
# view_hash computation
# ===========================================================================
# canonical_yaml_body = the `tilts` and `excludes` sections only,
#   serialized with sorted keys and stripped of comments + empty fields.
# view_hash = sha256(canonical_yaml_body, encoding=utf-8).hexdigest()
#
# The hash deliberately excludes metadata/extraction/prose so that:
# - Re-saving the same view (different upload_timestamp) preserves the hash.
# - Prose edits do not invalidate the pairing UNLESS the YAML body actually changed.
# - Phase 1 Supabase storage can de-duplicate views by view_hash across orgs.
#
# ---------------------------------------------------------------------------
# Pinned canonicalization algorithm (added 2026-04-24).
# ---------------------------------------------------------------------------
# Previously under-specified; this block is now the binding contract. Any
# implementation (Python, Node, Go, server-side Supabase function) that
# follows these rules exactly produces byte-identical canonical output, and
# therefore identical sha256 digests.
#
# Rule 1 — Scope.
#   Take ONLY these two top-level keys from the view YAML document:
#     - `tilts` (map)
#     - `excludes` (sequence; use [] if absent)
#   Ignore everything else (metadata, extraction, exclude_reasons, comments).
#
# Rule 2 — Strip empty/zero recursively.
#   A value is "empty" iff it is any of: None / null, 0 (int or float), ""
#   (empty string), [] (empty sequence), or {} (empty map) AFTER its children
#   have themselves been stripped.
#   - Walk tilts + excludes depth-first; strip empties bottom-up.
#   - "0" means the integer zero, NOT the string "0" and NOT False.
#   - Booleans are NOT stripped (there are no bool-valued tilts today; this is
#     future-proofing).
#
# Rule 3 — Serialize.
#   Use PyYAML's `yaml.safe_dump` with:
#     sort_keys=True, default_flow_style=False, allow_unicode=True,
#     width=1_000_000 (suppress line wrapping), indent=2.
#   This matches the output of every PyYAML 5.x / 6.x release that ships
#   `safe_dump`. Node `js-yaml` and Go `gopkg.in/yaml.v3` configured with
#   equivalent settings (sorted keys, block style, no flow, no wrapping, UTF-8,
#   2-space indent) produce identical bytes on the test fixture below.
#
# Rule 4 — Encode + hash.
#   canonical_body_bytes = canonical_yaml_string.encode("utf-8")
#   view_hash            = hashlib.sha256(canonical_body_bytes).hexdigest()
#
# Reference Python implementation (must pass the fixture in Rule 5):
#
#   import hashlib, yaml
#   def _strip_empty(obj):
#       if isinstance(obj, dict):
#           out = {}
#           for k, v in obj.items():
#               v = _strip_empty(v)
#               if v is None or v == 0 or v == "" or v == [] or v == {}:
#                   continue
#               out[k] = v
#           return out
#       if isinstance(obj, list):
#           return [_strip_empty(x) for x in obj
#                   if x not in (None, 0, "", [], {})]
#       return obj
#   def compute_view_hash(view: dict) -> str:
#       body = {
#           "tilts":    _strip_empty(view.get("tilts", {})),
#           "excludes": view.get("excludes", []) or [],
#       }
#       canonical = yaml.safe_dump(
#           body, sort_keys=True, default_flow_style=False,
#           allow_unicode=True, width=1_000_000, indent=2,
#       )
#       return hashlib.sha256(canonical.encode("utf-8")).hexdigest()
#
# Rule 5 — Test fixture (any implementation MUST match this byte-for-byte).
#   Input view (subset — only tilts + excludes matter):
#     tilts:
#       sectors: {information_technology: -1}
#       regions: {us: 1}
#       factors: {profitability: 2}
#       pillars: {econometrics_phase: 0}    # stripped (zero)
#       styles: {cap_size: {large: 0}}      # stripped (empty after inner strip)
#     excludes: []
#
#   Expected canonical_yaml_body (exact bytes, terminal newline included):
#     excludes: []
#     tilts:
#       factors:
#         profitability: 2
#       regions:
#         us: 1
#       sectors:
#         information_technology: -1
#
#   Expected view_hash (sha256 hex): 1629fba3f63d0b498ae69845460cf456f316acbdac239e4bef58e2fdd7b9cc69
#
#   A runnable version of this fixture lives in
#   `skills/_parallax/house-view/tests/fixtures/view_hash_fixture.yaml`;
#   `tests/test_view_hash.py` asserts the digest matches on every release.
#
# If a future change requires the canonicalization to evolve (e.g., to include
# new top-level keys), bump `schema_version` in audit.jsonl and emit a
# migration note — never silently alter the byte output.
