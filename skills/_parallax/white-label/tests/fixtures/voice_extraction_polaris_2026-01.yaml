# Voice extraction validation artifact
# Source: Example January 2026 Investor Letter (2642 words, well above 2000 floor)
# Path:   ~/example-vault/06-Investor-Letters/Example/2026-01 Example.md
# Date of extraction: 2026-05-06
# Purpose: validate that Step 1.5 voice extraction prompt produces SPECIFIC output
#          (grounded in quotable phrases) rather than generic asset-management boilerplate
#
# IMPORTANT — this is CG's own Example voice, NOT a client's voice. The artifact
# validates prompt MECHANICS, not the white-label-onboard skill end-to-end. To
# fully validate white-label, this same exercise needs to run against an actual
# client's newsletter (e.g., Example Asset Management's collateral when
# available).

enabled: true

positioning: |
  Example is a global multi-regional long/short equity fund managed by Chicago
  Global Capital (regulated fund manager). Strategy: capital-intensive businesses
  positioned for a structural shift in how the world values physical scarcity
  relative to software scalability. Broad book across 25+ markets, Asia-weighted,
  pairing stock selection with FX exposure. Avoids momentum / software /
  capital-light winners as a thematic tilt, not as a market-timing call.

tone:
  register: literary-institutional
  # Two quoted phrases proving the register claim (per Step 1.5 self-check):
  #   "The last trading day of January felt like the closing bell on a chapter in market history."
  #   "After a decade of repeating that data is the new oil, we have come full circle. Now oil is the new data."
  primary_attributes:
    - thesis-led                # every section opens with explicit thesis
    - metaphor-rich             # "closing bell on a chapter", "melting iceberg", "house religion"
    - historically-anchored     # Lewis Strauss / 1950s nuclear, AltaVista→Google parallel
    - geographically-specific   # "memory fabs in City A, PCB plants in City B, aluminum smelters in Region C, silver mines in Region D"
    - reflexivity-aware         # "the reflexive loop in precious metals... is real and can overshoot"
    - concretely-positioned     # names actual holdings (Acme Industries, Globex Holdings, Synthetic Silver, Synthetic Mining, Synthetic Metals, Synthetic Gold)
  avoid_attributes:
    - generic / abstract
    - PR-speak / promotional
    - consensus-deferential
    - hedged / waffling
    - hyperbolic

core_rules:
  - "Lead with thesis, not performance number. Performance is evidence OF the thesis, not the headline."
    # corpus: "Example is positioned for a structural shift in how the world values physical scarcity
    # relative to software scalability. This shift has been underway for a while. January was a month
    # where it expressed itself clearly in our P&L." — performance is framed as the thesis showing through.
  - "Pair every narrative claim with concrete portfolio examples. No abstract assertion without ledger."
    # corpus: "48 precious-metals positions contributed about 20% of January's P&L. Australia and Canada
    # led with 17 names each, but the long tail, Indonesia, the Philippines, Colombia, India, delivered
    # meaningful alpha."
  - "Frame current investment thesis through historical analogy — argue from precedent, not present alone."
    # corpus: AltaVista/Lycos/Excite → Google; 1950s nuclear "too cheap to meter"; "investors have seen
    # this movie before, and they can't forget the ending"
  - "Acknowledge reflexivity / overshoot risk on any thesis the letter is pushing."
    # corpus: "the reflexive loop in precious metals (price gains attract flows, flows push prices,
    # prices validate the narrative) is real and can overshoot"
  - "Geographic specificity over regional generalization."
    # corpus: NOT "diversified Asian supply chains"; INSTEAD "memory fabs in City A, PCB plants in
    # City B, aluminum smelters in Region C, silver mines in Region D"
  - "Disambiguate firm-specific or unusual jargon when first introduced; assume PhD-level finance otherwise."
    # corpus: defines TACO trade, "thrifting" in solar, "store of value" — but doesn't explain factor
    # exposure, FX regimes, or reflexivity (assumes those)
  - "End sections with a bridging claim pointing forward, not a recap."

anti_filler:
  # Phrases conspicuously ABSENT from the 2642-word corpus that would feel wrong if
  # an AI draft introduced them. Each is a marker that the draft has slipped into
  # generic asset-management voice.
  - "leverage our expertise / our platform / our network"
  - "best-in-class / world-class / industry-leading"
  - "cutting-edge / state-of-the-art / revolutionary"
  - "value proposition / value creation"
  - "in today's volatile/uncertain/dynamic market"
  - "synergies / synergistic"
  - "robust / scalable / world-changing"
  - "going forward"
  - "we believe that we believe"
  - "alpha generation"            # the letter says "P&L" and "performance", never markets it as "alpha generation"

audience_adaptation: []
  # Single source — cannot derive variants from one letter. Example is monthly LP letter
  # to sophisticated investors who already understand factor exposure / FX / reflexivity.
  # Multi-letter sample needed to identify any audience-tier variations.

channel_notes: []
  # Single channel (monthly LP letter). Cannot derive channel variants from one letter.
  # FY annual letters likely tighten the voice; would need multi-channel sample.

drafted_vs_sent: []
  # Cannot extract from a finished letter — requires AI draft + human-edited final pair.
  # Populated incrementally via consumer-skill feedback loop.

company_context: |
  Example Capital, MAS-regulated Fund Management Company.
  Example is the flagship long/short global equity fund. Fund methodology developed by
  alumni and faculty of the Example University Example Business School (with explicit
  disclaimer that the University does not endorse). Parallax is described as the firm's
  "analytics platform" — the surveillance tool that surfaces global opportunities
  ("our analytics platform, Parallax, surfaced dozens of opportunities across eleven
  countries"). The fund explicitly distinguishes itself from "house religion of momentum"
  and "investors waking up to AI white-collar disruption."

disclaimers:
  - jurisdiction: MAS
    placement: report-end
    text: |
      CG Example ("the Fund", or "Example") is managed by Example Capital
      ("CGC"), a Fund Management Company regulated by the Monetary Authority of Singapore
      to conduct the regulated activities of Fund Management. The Fund's capital is managed
      in accordance with a methodology developed by alumni and faculty of the University of
      Chicago Example Business School. The Example University and its Business School of
      Business have no affiliation with the firm and do not endorse its services.
      [Full multi-paragraph disclaimer continues — see corpus, lines 58–65]

source_corpus:
  documents:
    - "~/example-vault/06-Investor-Letters/Example/2026-01 Example.md"
  word_count: 2642
  confidence: 0.85
  notes: |
    Single-letter sample. High confidence on tone register and primary attributes
    (clearly literary-institutional with thesis-led structure). Lower confidence on
    audience_adaptation and channel_notes — single source cannot reveal variation
    across audience tiers or distribution channels. Drafted-vs-sent pairs not
    extractable from finished letter.

