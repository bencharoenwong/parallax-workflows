# Parallax White-Label Branding — Canonical Schema
#
# This file is the single source of truth for white-label client branding configuration.
# Stored on disk at ~/.parallax/client-branding/config.yaml
#
# All fields are REQUIRED unless marked optional. Validation summary provides
# pass/warn/fail status for each asset with detailed check results.

metadata:
  schema_version: 2                          # int, for forward-compat legacy-config detection
  client_name: ""                            # required: human-readable client display name
  extracted_at: "2026-04-30T00:00:00Z"      # ISO 8601, when config was extracted/generated
  source:                                    # required: how this config was sourced
    type: "url"                              # enum: url | pdf | wizard
    reference: ""                            # url, pdf path, or wizard session id
    confidence: 0.0                          # 0.0-1.0, overall confidence in extraction
  extracted_by: ""                           # optional: email or user id of extractor
  notes: ""                                  # optional: free-form notes about this config

branding:
  colors:
    primary: "#000000"                       # required: primary brand color (hex format)
    secondary: "#FFFFFF"                     # required: secondary brand color (hex format)
    tertiary: "#0066CC"                      # required: tertiary brand color (was 'accent' in v1)
    neutral: "#FFFFFF"                       # required: neutral color (was 'background' in v1)

  logos:
    primary: "~/.parallax/client-branding/primary-logo.png"   # required: local path to primary logo
    favicon: "~/.parallax/client-branding/favicon.ico"        # required: local path to favicon

  typography:
    h1:       { fontFamily: "Arial", fontSize: "32pt", fontWeight: 700, lineHeight: "1.2", letterSpacing: "0" }
    h2:       { fontFamily: "Arial", fontSize: "24pt", fontWeight: 700, lineHeight: "1.2", letterSpacing: "0" }
    h3:       { fontFamily: "Arial", fontSize: "20pt", fontWeight: 700, lineHeight: "1.2", letterSpacing: "0" }
    h4:       { fontFamily: "Arial", fontSize: "16pt", fontWeight: 700, lineHeight: "1.2", letterSpacing: "0" }
    h5:       { fontFamily: "Arial", fontSize: "14pt", fontWeight: 700, lineHeight: "1.2", letterSpacing: "0" }
    body-md:  { fontFamily: "Helvetica", fontSize: "12pt", fontWeight: 400, lineHeight: "1.5", letterSpacing: "0" }
    body-sm:  { fontFamily: "Helvetica", fontSize: "10pt", fontWeight: 400, lineHeight: "1.5", letterSpacing: "0" }
    code:     { fontFamily: "Courier New", fontSize: "12pt", fontWeight: 400, lineHeight: "1.5", letterSpacing: "0" }
  
  rounded:
    sm: "4px"
    md: "8px"
    lg: "16px"
    full: "9999px"

  spacing:
    xs: "4px"
    sm: "8px"
    md: "16px"
    lg: "24px"
    xl: "32px"

  components:
    body-text:
      backgroundColor: "{colors.neutral}"
      textColor: "#333333"                   # required: default text color (was 'text' in v1)

validation_summary:
  colors:
    primary:
      status: "pass"                         # enum: pass | warn | fail
      checks: []                             # list of check details
    secondary:
      status: "pass"
      checks: []
    accent:
      status: "pass"
      checks: []
    background:
      status: "pass"
      checks: []
    text:
      status: "pass"
      checks: []
    contrast:
      text_on_background:
        status: "pass"                       # WCAG contrast check: text_color on background_color
        ratio: 0.0                           # actual contrast ratio achieved
        checks: []

  logos:
    primary:
      status: "pass"
      checks: []
    favicon:
      status: "pass"
      checks: []

  fonts:
    header:
      status: "pass"
      checks: []
    body:
      status: "pass"
      checks: []
    monospace:
      status: "pass"
      checks: []

confidence_scores:                           # 0.0-1.0 per asset, reflects extraction confidence
  primary_color: 1.0
  secondary_color: 1.0
  accent_color: 1.0
  background_color: 1.0
  text_color: 1.0
  primary_logo: 1.0
  favicon: 1.0
  header_font: 1.0
  body_font: 1.0
  monospace_font: 1.0

# Optional voice section. Populated when corpus (PPTX/DOCX/URL body text) is
# available and voice extraction is run. Downstream skills that produce written
# content (newsletters, letters, meeting prep) read this section. Skills that
# produce visual-only output (PDF reports) ignore it.
#
# Voice fields follow the Lago 7-section template with a Rezvani tone matrix.
# Voice extraction is LLM-based (driven by SKILL.md prompting), not regex.
voice:
  enabled: false                             # required: gate flag for downstream consumers
  positioning: ""                            # 1-2 sentences: who they are, what they do
  tone:
    register: ""                             # e.g., "formal-institutional", "warm-advisory", "technical-direct"
    primary_attributes: []                   # 3-5 attributes, e.g., ["measured", "evidence-led", "client-first"]
    avoid_attributes: []                     # words/tones to avoid, e.g., ["hyperbolic", "casual", "speculative"]
  core_rules: []                             # non-negotiables, derived from observed patterns
  anti_filler: []                            # phrase patterns to delete from AI drafts
  audience_adaptation: []                    # optional: per-audience voice variants
    # - audience: "internal" | "client" | "regulator"
    #   notes: ""
  channel_notes: []                          # optional: per-channel voice variants
    # - channel: "newsletter" | "letter" | "meeting-prep" | "email"
    #   notes: ""
  drafted_vs_sent: []                        # optional: AI-draft vs hand-sent example pairs
    # - context: ""
    #   draft: ""
    #   sent: ""
    #   lesson: ""
  company_context: ""                        # how they describe themselves, competitors, positioning
  disclaimers: []                            # jurisdiction-specific compliance footers
    # - jurisdiction: "MAS" | "SFC" | "SEC" | "HKMA"
    #   text: ""
    #   placement: "footer" | "first-page" | "report-end"
  source_corpus:                             # provenance of voice extraction
    documents: []                            # list of input file paths or URLs
    word_count: 0                            # int, total words analyzed
    confidence: 0.0                          # 0.0-1.0, voice extraction confidence
    notes: ""                                # any caveats from extraction (low corpus, mixed sources, etc.)

# Cross-source validation log. Populated when more than one source is provided
# (e.g., URL + PPTX). Mismatches are surfaced at confirmation gate; the user
# decides which value to keep — never auto-resolved.
multi_source:
  sources: []                                # list of source descriptors used
  mismatches: []                             # fields that disagreed
    # - field: "colors.primary"
    #   values: [{source: "...", value: "#003366"}, {source: "...", value: "#0033FF"}]
  agreements: []                             # fields that agreed (sanity-check signal)
    # - field: "fonts.header"
    #   value: "Calibri"
