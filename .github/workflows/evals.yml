name: evals

permissions:
  contents: read

# Lightweight structural CI: runs the pure-function grader suite and the repo's
# doc-lint scripts on every PR and on pushes to main. No live Parallax / MCP calls,
# no secrets — these are the same offline checks contributors run locally.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  structural:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install test deps
        run: python -m pip install --upgrade pip pytest
      - name: Grader unit tests
        run: python -m pytest evals/graders/ -q
      - name: Section cross-reference lint
        run: python skills/_parallax/scripts/section-ref-lint.py skills/
      - name: Coverage lint (informational)
        run: bash skills/_parallax/scripts/coverage-lint.sh || true
