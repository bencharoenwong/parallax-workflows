# Per-repo no-mistakes overrides for parallax-workflows.
# Overrides ~/.no-mistakes/config.yaml for THIS repo only; other repos fall back
# to the global agent (codex).

# Gate agent for this repo: opencode (model pinned to opencode-go/glm-5.1 via the
# global agent_args_override — that field is global-only). Chosen over the global
# codex (rate-limited) and claude (OOM under session contention). glm-5.1 is
# gate-compatible (forced-tool capable); kimi-k2.6 is NOT — see opencode.jsonc.
agent: opencode

# Deterministic test command — replaces the LLM-agent test fallback that failed
# under codex usage limits / claude OOM. Runs the CONTRIBUTING-blessed CI-safe
# suites in one shell-agnostic invocation. Verified green: 285 passed, 1 xfailed.
# (The broader suite can't run in one invocation — white-label and judge-house-view
# both ship tests/conftest.py, which collide via pytest ImportPathMismatchError.)
commands:
  test: python3 -m pytest skills/_parallax/house-view/tests evals/graders -q
