# gitleaks configuration for parallax-workflows.
#
# This repo intentionally ships test-only fixture keys for round-trip signing
# tests. The fixtures are documented as test-only in
# `skills/_parallax/house-view/tests/fixtures/trusted_keys.json` (use: "test-only")
# and have no production trust binding (kid is fixture-scoped).
#
# Production deployments configure their own kids via the manifest signing flow
# and never use these fixture keys.

[extend]
useDefault = true

[allowlist]
description = "Test-only signing fixtures used by round-trip tests; not real secrets."
paths = [
    '''skills/_parallax/house-view/tests/fixtures/test-signing-key\.priv$''',
    '''skills/_parallax/house-view/tests/fixtures/.*\.testonly\..+$''',
]
